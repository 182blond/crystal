name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "16"

      - name: Build jsGBC-core
        working-directory: jsGBC-core
        run: |
          node -v
          npm ci --ignore-scripts
          npm run build

      - name: Build jsGBC-web
        working-directory: jsGBC-web
        run: |
          node -v
          npm install --ignore-scripts
          npx bower install --allow-root
          npm run build:pages

      - uses: actions/upload-pages-artifact@v3
        with:
          path: jsGBC-web/docs

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
